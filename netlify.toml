[build]
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Immutable cache for Next.js hashed static assets (JS, CSS, fonts)
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Long-lived cache for images in /public
[[headers]]
  for = "/taru-profile.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/taru-resume-preview.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# PDF resume — cache for 1 day so updates propagate reasonably fast
[[headers]]
  for = "/taru-resume.pdf"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# SVG icons
[[headers]]
  for = "/favicon.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/icons.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
